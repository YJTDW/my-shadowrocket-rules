# Manual Merge override: IPv4-only, DNS leak resistant and strict TUN routing.
proxies: []
ipv6: false
tcp-concurrent: true
unified-delay: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  use-system-hosts: false
  respect-rules: true

tun:
  enable: true
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  strict-route: true
  endpoint-independent-nat: false
  mtu: 1500

prepend-rules:
  # === OpenAI / ChatGPT / Sora / Codex 核心与周边服务 ===
  - DOMAIN-SUFFIX,chatgpt.com,PROXY
  - DOMAIN-SUFFIX,openai.com,PROXY
  - DOMAIN-SUFFIX,chat.com,PROXY
  - DOMAIN-SUFFIX,sora.com,PROXY
  - DOMAIN-SUFFIX,oaistatic.com,PROXY
  - DOMAIN-SUFFIX,oaiusercontent.com,PROXY
  - DOMAIN-SUFFIX,crixet.com,PROXY
  - DOMAIN-SUFFIX,client-api.arkoselabs.com,PROXY
  - DOMAIN,openai-api.arkoselabs.com,PROXY
  - DOMAIN-SUFFIX,chatgpt.livekit.cloud,PROXY
  - DOMAIN-SUFFIX,host.livekit.cloud,PROXY
  - DOMAIN-SUFFIX,turn.livekit.cloud,PROXY
  - DOMAIN-SUFFIX,o33249.ingest.sentry.io,PROXY
  - DOMAIN-SUFFIX,browser-intake-datadoghq.com,PROXY
