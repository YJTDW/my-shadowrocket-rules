<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Apple WLOC 虚拟定位</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --apple-blue: #007aff;
  --apple-blue-hover: #0062cc;
  --apple-green: #34c759;
  --apple-red: #ff3b30;
  --apple-orange: #ff9500;
  --bg-glass: rgba(255, 255, 255, 0.85);
  --bg-glass-dark: rgba(28, 28, 30, 0.82);
  --text-main: #1c1c1e;
  --text-sub: #8e8e93;
  --border-light: rgba(60, 60, 67, 0.12);
  --shadow-float: 0 12px 32px rgba(0, 0, 0, 0.12), 0 2px 6px rgba(0, 0, 0, 0.08);
  --shadow-btn: 0 4px 12px rgba(0, 122, 255, 0.25);
  --radius-card: 20px;
  --radius-btn: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { width:100%; height:100%; overflow:hidden; font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, sans-serif; background:#e5e5ea; color:var(--text-main); }

/* 全屏地图容器 */
#map { width:100vw; height:100vh; position:absolute; top:0; left:0; z-index:1; }

/* 顶部浮动搜索与切换栏 */
.top-bar {
  position: absolute;
  top: max(16px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  width: min(calc(100% - 32px), 520px);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.search-box {
  display: flex;
  align-items: center;
  background: var(--bg-glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-card);
  padding: 6px 8px 6px 16px;
  box-shadow: var(--shadow-float);
  transition: all 0.25s ease;
}

.search-box:focus-within {
  border-color: rgba(0, 122, 255, 0.5);
  box-shadow: 0 14px 36px rgba(0, 122, 255, 0.18);
}

.search-icon {
  width: 20px;
  height: 20px;
  stroke: var(--text-sub);
  margin-right: 10px;
  flex-shrink: 0;
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 15px;
  color: var(--text-main);
  outline: none;
  font-weight: 400;
}

.search-input::placeholder { color: var(--text-sub); }

.search-btn {
  background: var(--apple-blue);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease;
}

.search-btn:active { transform: scale(0.96); }

/* 图层选择器微调 */
.layer-pills {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 4px 6px;
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 14px;
  border: 1px solid var(--border-light);
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  scrollbar-width: none;
}
.layer-pills::-webkit-scrollbar { display: none; }

.pill-btn {
  border: none;
  background: transparent;
  padding: 6px 14px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-main);
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s ease;
}

.pill-btn.active {
  background: var(--apple-blue);
  color: #fff;
  box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
}

/* 底部抽屉型控制面板 (Apple Maps Style) */
.bottom-sheet {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(100%, 540px);
  z-index: 1000;
  background: var(--bg-glass);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border-top-left-radius: 28px;
  border-top-right-radius: 28px;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-float);
  padding: 12px 20px max(24px, env(safe-area-inset-bottom)) 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.drag-handle {
  width: 36px;
  height: 4px;
  background: rgba(142, 142, 147, 0.4);
  border-radius: 2px;
  margin: 0 auto 4px auto;
}

/* 当前选取位置展示卡片 */
.location-card {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.loc-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-sub);
}

.loc-coords {
  font-family: "SF Mono", Menlo, Consolas, monospace;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-main);
}

/* 生效状态指示条 */
.active-status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(242, 242, 247, 0.7);
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--apple-green);
  box-shadow: 0 0 8px rgba(52, 199, 89, 0.6);
}

.dot.inactive {
  background: var(--text-sub);
  box-shadow: none;
}

/* 按钮组样式 */
.action-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 10px;
}

.btn-main {
  background: linear-gradient(135deg, var(--apple-blue), #0056b3);
  color: #fff;
  border: none;
  border-radius: var(--radius-btn);
  padding: 14px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow-btn);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-main:active { transform: scale(0.97); }

.btn-sub {
  background: rgba(118, 118, 128, 0.12);
  color: var(--text-main);
  border: none;
  border-radius: var(--radius-btn);
  padding: 12px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.btn-sub:active { background: rgba(118, 118, 128, 0.22); transform: scale(0.96); }

.btn-sub.danger { color: var(--apple-red); }

/* 收藏夹与辅助弹窗 */
.favorites-bar {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.favorites-bar::-webkit-scrollbar { display: none; }

.fav-tag {
  background: #fff;
  border: 1px solid var(--border-light);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}

.fav-del-btn {
  color: var(--text-sub);
  font-size: 14px;
  line-height: 1;
}

/* 顶部 / 通用 Modal */
.modal-mask {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-mask.active { display: flex; animation: fadeIn 0.25s ease; }

.modal-card {
  background: #fff;
  width: min(100%, 360px);
  border-radius: 24px;
  padding: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.modal-title { font-size: 18px; font-weight: 700; text-align: center; }

.modal-input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--border-light);
  background: #f2f2f7;
  border-radius: 12px;
  font-size: 15px;
  outline: none;
}

.modal-actions { display: flex; gap: 10px; }

.toast-msg {
  position: fixed;
  top: max(20px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(0, 0, 0, 0.85);
  color: #fff;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  z-index: 10000;
  transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
}
.toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<!-- 地图画布容器 -->
<div id="map"></div>

<!-- 顶部搜索与图层切换 -->
<div class="top-bar">
  <div class="search-box">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input type="text" id="searchInput" class="search-input" placeholder="搜索地名、地址或粘贴链接/坐标..." />
    <button class="search-btn" onclick="handleSearch()">搜索</button>
  </div>

  <div class="layer-pills">
    <button class="pill-btn active" data-layer="amap" onclick="switchLayer('amap')">高德标准</button>
    <button class="pill-btn" data-layer="satellite" onclick="switchLayer('satellite')">高清卫星</button>
    <button class="pill-btn" data-layer="voyager" onclick="switchLayer('voyager')">苹果浅色</button>
    <button class="pill-btn" data-layer="dark" onclick="switchLayer('dark')">苹果暗色</button>
  </div>
</div>

<!-- 底部控制抽屉 (Apple Maps Style) -->
<div class="bottom-sheet">
  <div class="drag-handle"></div>

  <div class="location-card">
    <div class="loc-title">当前选择坐标</div>
    <div class="loc-coords" id="coordsDisplay">经度 113.941140  纬度 22.544577</div>
  </div>

  <!-- 生效指示器 -->
  <div class="active-status-bar">
    <div class="status-badge">
      <div class="dot" id="statusDot"></div>
      <span id="activeText">系统持久化数据: 加载中...</span>
    </div>
    <div style="display:flex; gap:6px;">
      <button onclick="queryActive()" style="border:none; background:none; color:var(--apple-blue); font-size:12px; font-weight:600; cursor:pointer;">刷新</button>
    </div>
  </div>

  <!-- 收藏列表横滑区域 -->
  <div id="favContainer" class="favorites-bar"></div>

  <!-- 操作按钮矩阵 -->
  <div class="action-grid">
    <button class="btn-main" id="saveBtn" onclick="saveLocation()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
      写入设备定位
    </button>
    
    <button class="btn-sub" onclick="locateMe()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
      定位当前
    </button>

    <button class="btn-sub" onclick="openFavModal()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
      收藏点位
    </button>
  </div>

  <!-- 辅助功能入口 -->
  <div style="display:flex; justify-content:space-between; align-items:center; margin-top:4px;">
    <button onclick="clearActiveLocation()" style="border:none; background:none; color:var(--apple-red); font-size:12px; font-weight:500; cursor:pointer;">还原真实定位</button>
    <button onclick="openHelpModal()" style="border:none; background:none; color:var(--text-sub); font-size:12px; font-weight:500; cursor:pointer;">模块与安装说明</button>
  </div>
</div>

<!-- 提示框 -->
<div class="toast-msg" id="toast"></div>

<!-- 收藏 Modal -->
<div class="modal-mask" id="favModal">
  <div class="modal-card">
    <div class="modal-title">收藏当前点位</div>
    <input type="text" id="favNameInput" class="modal-input" placeholder="输入名称（如: 公司、家里）" maxlength="20" />
    <div class="modal-actions">
      <button class="btn-sub" style="flex:1" onclick="closeModal('favModal')">取消</button>
      <button class="btn-main" style="flex:1" onclick="confirmAddFav()">保存</button>
    </div>
  </div>
</div>

<!-- 说明 Modal -->
<div class="modal-mask" id="helpModal">
  <div class="modal-card" style="width:min(100%, 420px)">
    <div class="modal-title">安装与配套工具</div>
    <div style="font-size:13px; color:var(--text-main); line-height:1.6; display:flex; flex-direction:column; gap:10px;">
      <div>快捷配置模块和iOS官方快捷指令：</div>
      <button class="btn-sub" onclick="copyText('https://raw.githubusercontent.com/YJTDW/my-shadowrocket-rules/main/apple-wloc.module')">复制专属云端模块 URL</button>
      <a class="btn-sub" style="text-decoration:none;" href="https://www.icloud.com/shortcuts/2a811c3bac0e4694b1875ae45b26ab0d" target="_blank">📥 添加 iOS 定位键快捷指令</a>
      <a class="btn-sub" style="text-decoration:none;" href="https://www.icloud.com/shortcuts/9092b1a576cf4b7c8bc0dd931ba512a6" target="_blank">🔄 添加 iOS 恢复键快捷指令</a>
    </div>
    <button class="btn-main" onclick="closeModal('helpModal')">关闭</button>
  </div>
</div>

<script>
const SAVE_API = 'https://gs-loc.apple.com/wloc-settings/save';
const FAV_KEY = 'apple_wloc_favs';

let currentLat = 22.544577, currentLon = 113.941140;
let map, marker, currentTileLayer;

// 地图图层配置
const tileServers = {
  amap: L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=7&x={x}&y={y}&z={z}', { maxZoom:19, subdomains:'1234', attribution:'高德地图' }),
  satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom:19, attribution:'ArcGIS Satellite' }),
  voyager: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom:19, attribution:'Carto' }),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom:19, attribution:'Carto Dark' })
};

// 初始化地图
function initMap() {
  map = L.map('map', { zoomControl: false }).setView([currentLat, currentLon], 15);
  currentTileLayer = tileServers.amap;
  currentTileLayer.addTo(map);

  // 自定义地图标记
  const customIcon = L.divIcon({
    className: 'custom-pin',
    html: `<div style="width:24px;height:24px;background:#007aff;border:3px solid #fff;border-radius:50%;box-shadow:0 4px 12px rgba(0,122,255,0.4);animation:pulse 2s infinite;"></div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12]
  });

  marker = L.marker([currentLat, currentLon], { draggable: true, icon: customIcon }).addTo(map);

  marker.on('dragend', e => {
    const pos = e.target.getLatLng();
    updateCoords(pos.lat, pos.lng);
  });

  map.on('click', e => {
    updateCoords(e.latlng.lat, e.latlng.lng);
  });

  renderFavs();
  queryActive();
}

function switchLayer(name) {
  if (currentTileLayer) map.removeLayer(currentTileLayer);
  currentTileLayer = tileServers[name];
  currentTileLayer.addTo(map);

  document.querySelectorAll('.pill-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.layer === name);
  });
}

function updateCoords(lat, lon) {
  currentLat = lat;
  currentLon = lon;
  marker.setLatLng([lat, lon]);
  document.getElementById('coordsDisplay').textContent = `经度 ${lon.toFixed(6)}  纬度 ${lat.toFixed(6)}`;
}

function moveTo(lat, lon, zoom = 15) {
  updateCoords(lat, lon);
  map.setView([lat, lon], zoom);
}

// 消息提示 Toast
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// 保存位置到设备
async function saveLocation() {
  const btn = document.getElementById('saveBtn');
  btn.style.opacity = '0.7';
  btn.textContent = '写入中...';

  try {
    const res = await fetch(`${SAVE_API}?lon=${currentLon}&lat=${currentLat}&acc=25`, { method: 'GET', mode: 'cors', cache: 'no-store' });
    const data = await res.json();
    if (data.success) {
      toast('✓ 已成功写入系统定位');
      queryActive();
    } else {
      throw new Error(data.error || '写入失败');
    }
  } catch (e) {
    toast('✓ 坐标数据已发送（请确保小火箭代理开启）');
  } finally {
    btn.style.opacity = '1';
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>写入设备定位`;
  }
}

// 查询激活状态
function queryActive() {
  const text = document.getElementById('activeText');
  const dot = document.getElementById('statusDot');
  text.textContent = '查询设备持久化数据...';

  fetch(`${SAVE_API}?action=query`, { method: 'GET', mode: 'cors', cache: 'no-store' })
    .then(r => r.json())
    .then(d => {
      if (d.success && d.longitude && d.latitude) {
        text.textContent = `当前生效: ${parseFloat(d.longitude).toFixed(4)}, ${parseFloat(d.latitude).toFixed(4)}`;
        dot.className = 'dot';
      } else {
        text.textContent = '设备未保存持久数据 (恢复真实定位中)';
        dot.className = 'dot inactive';
      }
    })
    .catch(() => {
      text.textContent = '未检测到配置节点 (请检查代理开关)';
      dot.className = 'dot inactive';
    });
}

// 清除定位数据
function clearActiveLocation() {
  if (!confirm('确定清除设备持久化的虚拟定位？清除后将自动恢复真实 GPS 定位。')) return;

  fetch(`${SAVE_API}?action=clear`, { method: 'GET', mode: 'cors', cache: 'no-store' })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        toast('✓ 已清空，恢复真实定位');
        queryActive();
      }
    })
    .catch(() => {
      toast('已发送清空请求');
    });
}

// 当前位置
function locateMe() {
  if (!navigator.geolocation) return toast('浏览器不支持定位');
  toast('正在获取当前真实 GPS...');
  navigator.geolocation.getCurrentPosition(
    pos => moveTo(pos.coords.latitude, pos.coords.longitude, 16),
    err => toast('定位获取失败: ' + err.message)
  );
}

// 搜索逻辑
function handleSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return toast('请输入地名或坐标');

  // 解析经纬度文本或地图 URL
  let match = query.match(/(-?\d{1,3}\.\d+)[,\s]+(-?\d{1,3}\.\d+)/);
  if (match) {
    return moveTo(parseFloat(match[1]), parseFloat(match[2]), 16);
  }

  toast('搜索中...');
  fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`)
    .then(r => r.json())
    .then(data => {
      if (data && data.length > 0) {
        moveTo(parseFloat(data[0].lat), parseFloat(data[0].lon), 16);
        toast(`已定位到: ${data[0].display_name.slice(0, 20)}`);
      } else {
        toast('未找到对应地点');
      }
    })
    .catch(() => toast('搜索解析失败'));
}

// 收藏逻辑
function getFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch(e) { return []; }
}

function renderFavs() {
  const favs = getFavs();
  const container = document.getElementById('favContainer');
  if (!favs.length) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = favs.map((f, i) => `
    <div class="fav-tag" onclick="moveTo(${f.lat}, ${f.lon}, 16)">
      📍 ${escapeHtml(f.name)}
      <span class="fav-del-btn" onclick="event.stopPropagation(); delFav(${i})">×</span>
    </div>
  `).join('');
}

function openFavModal() {
  document.getElementById('favModal').classList.add('active');
  document.getElementById('favNameInput').value = '';
  setTimeout(() => document.getElementById('favNameInput').focus(), 100);
}

function confirmAddFav() {
  const name = document.getElementById('favNameInput').value.trim();
  if (!name) return toast('请输入点位名称');
  const favs = getFavs();
  favs.push({ name, lat: currentLat, lon: currentLon });
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  closeModal('favModal');
  renderFavs();
  toast(`✓ 已收藏: ${name}`);
}

function delFav(i) {
  const favs = getFavs();
  favs.splice(i, 1);
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  renderFavs();
}

function openHelpModal() { document.getElementById('helpModal').classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('✓ 已复制到剪贴板'));
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });

window.onload = initMap;
</script>
</body>
</html>
