<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WLOC 定位">
<meta name="theme-color" content="#FAFBFC">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/hankinsus/wloc/refs/heads/main/wloc.jpg">
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIldMT0Mgg55mo5YWt5L2NIiwKICAic2hvcnRfbmFtZSI6ICJXTExDIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjRkFGQkZDIiwKICAidGhlbWVfY29sb3IiOiAiIzBGQTY2RDgiCn0=">

<title>WLOC 虚拟定位工具</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --primary: #0A66D8;
  --primary-pressed: #0859BD;

  --text-main: #111827;
  --text-secondary: #667085;
  --text-tertiary: #98A2B3;

  --surface: rgba(250, 251, 252, 0.94);
  --surface-secondary: #F2F4F7;
  --border: rgba(15, 23, 42, 0.08);

  --danger: #E5484D;
  --success: #12B76A;

  --radius-button: 16px;
  --radius-card: 20px;
  --radius-sheet: 28px;

  --shadow-search: 0 4px 18px rgba(15, 23, 42, 0.10);
  --shadow-sheet: 0 -10px 40px rgba(15, 23, 42, 0.10);
  --shadow-primary: 0 8px 20px rgba(10, 102, 216, 0.22);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", sans-serif; background: #e2e8f0; color: var(--text-main); }

/* 全屏地图容器 */
#map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; background: #f1f5f9; }

/* 地图正中央固定精准准星 */
.map-crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 500;
  pointer-events: none;
  display: flex;
  align-items: center;
  justify-content: center;
}
.crosshair-svg {
  width: 32px;
  height: 32px;
  filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.25));
  transition: transform 0.15s ease;
}
.map-crosshair.moving .crosshair-svg {
  transform: scale(1.15);
}

/* 顶部极简搜索栏 */
.top-bar {
  position: absolute;
  top: max(14px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  width: min(calc(100% - 24px), 480px);
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 8px;
}

.search-box {
  flex: 1;
  display: flex;
  align-items: center;
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: var(--radius-button);
  padding: 6px 8px 6px 14px;
  box-shadow: var(--shadow-search);
  border: 1px solid var(--border);
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 15px;
  color: var(--text-main);
  outline: none;
  font-weight: 400;
}
.search-input::placeholder { color: var(--text-tertiary); }

.top-icon-btn {
  width: 44px;
  height: 44px;
  border: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: var(--radius-button);
  color: var(--text-main);
  box-shadow: var(--shadow-search);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.12s ease;
}
.top-icon-btn:active { transform: scale(0.94); }

/* 底部极其清爽的系统面板 */
.bottom-sheet {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(100%, 480px);
  z-index: 1000;
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: var(--radius-sheet) var(--radius-sheet) 0 0;
  box-shadow: var(--shadow-sheet);
  padding: 10px 20px max(20px, env(safe-area-inset-bottom)) 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

.bottom-sheet.dimmed {
  opacity: 0.45;
  transform: translateX(-50%) translateY(10px);
}

.drag-handle {
  width: 32px;
  height: 4px;
  background: rgba(152, 162, 179, 0.4);
  border-radius: 2px;
  margin: 0 auto 2px auto;
}

/* 顶部标题与状态行 */
.sheet-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sheet-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-main);
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--success);
}
.status-dot.off { background: var(--text-tertiary); }
.status-dot.warn { background: #FF9500; }

/* 坐标卡片（两列式） */
.coord-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  background: var(--surface-secondary);
  padding: 10px 14px;
  border-radius: var(--radius-card);
}

.coord-item {
  display: flex;
  flex-direction: column;
  cursor: pointer;
}
.coord-item:active { opacity: 0.7; }

.label {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 400;
  margin-bottom: 2px;
}

.coordinate {
  font-family: "SF Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.4px;
  color: var(--text-main);
}

/* 收藏夹 Pill 列表 */
.fav-bar {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.fav-bar::-webkit-scrollbar { display: none; }

.fav-chip {
  background: #ffffff;
  border: 1px solid var(--border);
  padding: 5px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  color: var(--text-main);
  box-shadow: 0 2px 6px rgba(0,0,0,0.03);
}
.fav-del { color: var(--text-tertiary); margin-left: 3px; font-size: 13px; }

/* 按钮设计 */
.primary-button {
  width: 100%;
  height: 54px;
  border: 0;
  border-radius: var(--radius-button);
  color: #ffffff;
  background: var(--primary);
  font-size: 17px;
  font-weight: 600;
  box-shadow: var(--shadow-primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.15s ease;
}
.primary-button:active {
  background: var(--primary-pressed);
  transform: scale(0.98);
}
.primary-button.success {
  background: var(--success);
  box-shadow: 0 8px 20px rgba(18, 183, 106, 0.25);
}

.secondary-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.secondary-button {
  height: 40px;
  background: var(--surface-secondary);
  color: var(--text-main);
  border: none;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  transition: background 0.15s ease;
}
.secondary-button:active { background: #E4E7EC; }
.secondary-button.danger-text { color: var(--danger); }

/* 下拉菜单 & 弹窗 */
.menu-popover {
  position: absolute;
  top: max(68px, env(safe-area-inset-top));
  right: 12px;
  width: 180px;
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-sheet);
  z-index: 2000;
  display: none;
  flex-direction: column;
  padding: 6px;
  gap: 2px;
}
.menu-popover.active { display: flex; animation: popIn 0.15s ease; }

.menu-item {
  border: none;
  background: transparent;
  padding: 10px 12px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-main);
  text-align: left;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.menu-item.active { background: rgba(10, 102, 216, 0.1); color: var(--primary); font-weight: 600; }

.modal-overlay {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background: rgba(15, 23, 42, 0.35);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }

.modal-box {
  background: #ffffff;
  width: min(100%, 340px);
  border-radius: var(--radius-card);
  padding: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.14);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.modal-title { font-size: 16px; font-weight: 600; text-align: center; color: var(--text-main); }
.modal-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  background: var(--surface-secondary);
  border-radius: 12px;
  font-size: 14px;
  outline: none;
}
.modal-btns { display: flex; gap: 8px; }

.toast {
  position: fixed;
  top: max(16px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: rgba(17, 24, 39, 0.92);
  color: #ffffff;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  z-index: 10000;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes popIn {
  from { opacity: 0; transform: scale(0.92); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<!-- 地图画布 -->
<div id="map"></div>

<!-- 正中央准星 -->
<div class="map-crosshair" id="crosshair">
  <svg class="crosshair-svg" viewBox="0 0 40 40" fill="none">
    <circle cx="20" cy="20" r="8" stroke="#0A66D8" stroke-width="2.5" fill="rgba(10,102,216,0.15)" />
    <line x1="20" y1="2" x2="20" y2="9" stroke="#0A66D8" stroke-width="2" stroke-linecap="round" />
    <line x1="20" y1="31" x2="20" y2="38" stroke="#0A66D8" stroke-width="2" stroke-linecap="round" />
    <line x1="2" y1="20" x2="9" y2="20" stroke="#0A66D8" stroke-width="2" stroke-linecap="round" />
    <line x1="31" y1="20" x2="38" y2="20" stroke="#0A66D8" stroke-width="2" stroke-linecap="round" />
  </svg>
</div>

<!-- 顶部极简搜索与操作图标 -->
<div class="top-bar">
  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="搜索地名、地址或粘贴坐标..." />
    <button onclick="handleSearch()" style="border:none;background:none;padding:4px 8px;color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;">搜索</button>
  </div>

  <button class="top-icon-btn" onclick="togglePopover('layerMenu')" title="地图样式">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
      <polyline points="2 17 12 22 22 17"></polyline>
      <polyline points="2 12 12 17 22 12"></polyline>
    </svg>
  </button>

  <button class="top-icon-btn" onclick="openModal('helpModal')" title="模块说明">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="12" y1="16" x2="12" y2="12"></line>
      <line x1="12" y1="8" x2="12.01" y2="8"></line>
    </svg>
  </button>
</div>

<!-- 地图样式 Popover 菜单 -->
<div class="menu-popover" id="layerMenu">
  <button class="menu-item active" data-layer="amap" onclick="selectLayer('amap')">高德矢量 <span>✓</span></button>
  <button class="menu-item" data-layer="satellite" onclick="selectLayer('satellite')">高德卫星</button>
  <button class="menu-item" data-layer="light" onclick="selectLayer('light')">Apple 浅色</button>
  <button class="menu-item" data-layer="dark" onclick="selectLayer('dark')">Apple 暗色</button>
</div>

<!-- 底部控制面板 (极其耐看干净) -->
<div class="bottom-sheet" id="bottomSheet">
  <div class="drag-handle"></div>

  <!-- 头部：标题与右侧融合状态 -->
  <div class="sheet-header">
    <div class="sheet-title">目标位置</div>
    <div class="status-badge" onclick="queryActive()">
      <div class="status-dot off" id="statusDot"></div>
      <span id="statusText">未连接 ●</span>
    </div>
  </div>

  <!-- 坐标展示两列 -->
  <div class="coord-grid">
    <div class="coord-item" onclick="copyCoord('lon')" title="点击复制经度">
      <span class="label">经度</span>
      <span class="coordinate" id="lonDisplay">113.941140</span>
    </div>
    <div class="coord-item" onclick="copyCoord('lat')" title="点击复制纬度">
      <span class="label">纬度</span>
      <span class="coordinate" id="latDisplay">22.544577</span>
    </div>
  </div>

  <!-- 收藏夹 Pills -->
  <div id="favContainer" class="fav-bar"></div>

  <!-- 唯一的实心蓝色主按钮 -->
  <button class="primary-button" id="saveBtn" onclick="saveLocation()">
    写入此位置
  </button>

  <!-- 轻量次级操作组 -->
  <div class="secondary-row">
    <button class="secondary-button" onclick="locateMe()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
      定位当前
    </button>
    <button class="secondary-button" onclick="openModal('favModal')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
      收藏点位
    </button>
    <button class="secondary-button danger-text" onclick="openModal('confirmResetModal')">
      恢复真实定位
    </button>
  </div>
</div>

<!-- 提示框 Toast -->
<div class="toast" id="toast"></div>

<!-- 收藏弹窗 -->
<div class="modal-overlay" id="favModal">
  <div class="modal-box">
    <div class="modal-title">收藏当前点位</div>
    <input type="text" id="favNameInput" class="modal-input" placeholder="输入点位名称（如：家、公司）" maxlength="15" />
    <div class="modal-btns">
      <button class="secondary-button" style="flex:1" onclick="closeModal('favModal')">取消</button>
      <button class="primary-button" style="flex:1;height:40px;font-size:14px;" onclick="confirmAddFav()">保存</button>
    </div>
  </div>
</div>

<!-- 确认还原定位弹窗 -->
<div class="modal-overlay" id="confirmResetModal">
  <div class="modal-box">
    <div class="modal-title">还原真实 GPS 定位</div>
    <div style="font-size:13px;color:var(--text-secondary);text-align:center;line-height:1.5;">
      确定清除设备上持久化的虚拟定位？清除后将恢复真实的 GPS 网络定位。
    </div>
    <div class="modal-btns">
      <button class="secondary-button" style="flex:1" onclick="closeModal('confirmResetModal')">取消</button>
      <button class="primary-button" style="flex:1;height:40px;font-size:14px;background:var(--danger);" onclick="confirmClearActive()">确定还原</button>
    </div>
  </div>
</div>

<!-- 模块说明弹窗 -->
<div class="modal-overlay" id="helpModal">
  <div class="modal-box">
    <div class="modal-title">模块与快捷指令</div>
    <div style="font-size:13px; color:var(--text-secondary); line-height:1.6; display:flex; flex-direction:column; gap:8px;">
      <button class="secondary-button" onclick="copyText('https://raw.githubusercontent.com/YJTDW/my-shadowrocket-rules/main/apple-wloc.module')">复制专属云端模块 URL</button>
      <a class="secondary-button" style="text-decoration:none;" href="https://www.icloud.com/shortcuts/2a811c3bac0e4694b1875ae45b26ab0d" target="_blank">📥 添加 iOS 定位键快捷指令</a>
      <a class="secondary-button" style="text-decoration:none;" href="https://www.icloud.com/shortcuts/9092b1a576cf4b7c8bc0dd931ba512a6" target="_blank">🔄 添加 iOS 恢复键快捷指令</a>
    </div>
    <button class="secondary-button" onclick="closeModal('helpModal')">关闭</button>
  </div>
</div>

<script>
const SAVE_API = 'https://gs-loc.apple.com/wloc-settings/save';
const FAV_KEY = 'apple_wloc_favs_v3';
const LAST_VIEW_KEY = 'apple_wloc_last_view';

let currentLat = 22.544577, currentLon = 113.941140;
let map, currentLayer, realLocMarker;
let activeSavedLat = null, activeSavedLon = null;

// 高速瓦片地图源
const tileLayers = {
  amap: L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
    subdomains: ['1', '2', '3', '4'],
    maxZoom: 18,
    maxNativeZoom: 18,
    updateWhenIdle: false,
    updateWhenZooming: false,
    keepBuffer: 4
  }),
  satellite: L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', {
    subdomains: ['1', '2', '3', '4'],
    maxZoom: 18,
    maxNativeZoom: 18,
    updateWhenIdle: false,
    updateWhenZooming: false,
    keepBuffer: 4
  }),
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    updateWhenIdle: false
  }),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    updateWhenIdle: false
  })
};

function initMap() {
  // 读取上次记忆位置
  try {
    const last = JSON.parse(localStorage.getItem(LAST_VIEW_KEY));
    if (last && last.lat && last.lon) {
      currentLat = last.lat;
      currentLon = last.lon;
    }
  } catch(e) {}

  map = L.map('map', {
    zoomControl: false,
    attributionControl: false
  }).setView([currentLat, currentLon], 15);

  currentLayer = tileLayers.amap;
  currentLayer.addTo(map);

  // 地图移动监听：拖拽时沉降面板，停止时精准取中央经纬度
  const sheet = document.getElementById('bottomSheet');
  const crosshair = document.getElementById('crosshair');

  map.on('movestart dragstart', () => {
    sheet.classList.add('dimmed');
    crosshair.classList.add('moving');
  });

  map.on('moveend dragend', () => {
    sheet.classList.remove('dimmed');
    crosshair.classList.remove('moving');
    const center = map.getCenter();
    updateCoordsDisplay(center.lat, center.lng);
  });

  updateCoordsDisplay(currentLat, currentLon);
  renderFavs();
  queryActive();
}

function updateCoordsDisplay(lat, lon) {
  currentLat = lat;
  currentLon = lon;
  document.getElementById('lonDisplay').textContent = lon.toFixed(6);
  document.getElementById('latDisplay').textContent = lat.toFixed(6);

  // 保存最新视图记忆
  try {
    localStorage.setItem(LAST_VIEW_KEY, JSON.stringify({ lat, lon, zoom: map.getZoom() }));
  } catch(e) {}

  checkUnwrittenChanges();
}

function checkUnwrittenChanges() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (activeSavedLat !== null && activeSavedLon !== null) {
    const diff = Math.abs(currentLat - activeSavedLat) + Math.abs(currentLon - activeSavedLon);
    if (diff > 0.0001) {
      dot.className = 'status-dot warn';
      text.textContent = '有未写入变更 ●';
    } else {
      dot.className = 'status-dot';
      text.textContent = '已生效 ●';
    }
  }
}

function selectLayer(name) {
  if (currentLayer) map.removeLayer(currentLayer);
  currentLayer = tileLayers[name];
  currentLayer.addTo(map);

  document.querySelectorAll('#layerMenu .menu-item').forEach(item => {
    const isTarget = item.dataset.layer === name;
    item.classList.toggle('active', isTarget);
    item.querySelector('span')?.remove();
    if (isTarget) {
      item.insertAdjacentHTML('beforeend', ' <span>✓</span>');
    }
  });

  closePopover('layerMenu');
}

function moveTo(lat, lon, zoom = 15) {
  map.setView([lat, lon], zoom);
  updateCoordsDisplay(lat, lon);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// 写入坐标到设备
async function saveLocation() {
  const btn = document.getElementById('saveBtn');
  btn.style.opacity = '0.8';
  btn.textContent = '写入中...';

  try {
    const res = await fetch(`${SAVE_API}?lon=${currentLon}&lat=${currentLat}&acc=25`, { method: 'GET', mode: 'cors', cache: 'no-store' });
    const data = await res.json();
    if (data.success) {
      activeSavedLat = currentLat;
      activeSavedLon = currentLon;
      btn.classList.add('success');
      btn.textContent = '✓ 已写入此位置';
      toast('✓ 成功写入系统定位');
      checkUnwrittenChanges();
      setTimeout(() => {
        btn.classList.remove('success');
        btn.textContent = '写入此位置';
        btn.style.opacity = '1';
      }, 2000);
    } else {
      throw new Error(data.error || '写入失败');
    }
  } catch (e) {
    btn.classList.add('success');
    btn.textContent = '✓ 已发送写入请求';
    toast('✓ 坐标数据已发送给代理模块');
    setTimeout(() => {
      btn.classList.remove('success');
      btn.textContent = '写入此位置';
      btn.style.opacity = '1';
    }, 2000);
  }
}

// 查询系统激活数据
function queryActive() {
  const text = document.getElementById('statusText');
  const dot = document.getElementById('statusDot');

  text.textContent = '检查中...';

  fetch(`${SAVE_API}?action=query`, { method: 'GET', mode: 'cors', cache: 'no-store' })
    .then(r => r.json())
    .then(d => {
      if (d.success && d.longitude && d.latitude) {
        activeSavedLon = parseFloat(d.longitude);
        activeSavedLat = parseFloat(d.latitude);
        checkUnwrittenChanges();
      } else {
        activeSavedLat = null; activeSavedLon = null;
        text.textContent = '未保存坐标 ●';
        dot.className = 'status-dot off';
      }
    })
    .catch(() => {
      activeSavedLat = null; activeSavedLon = null;
      text.textContent = '未连接配置 ●';
      dot.className = 'status-dot off';
    });
}

function confirmClearActive() {
  closeModal('confirmResetModal');
  fetch(`${SAVE_API}?action=clear`, { method: 'GET', mode: 'cors', cache: 'no-store' })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        activeSavedLat = null; activeSavedLon = null;
        toast('✓ 已清除，恢复真实定位');
        queryActive();
      }
    })
    .catch(() => toast('还原请求已发送'));
}

// 物理当前位置
function locateMe() {
  if (!navigator.geolocation) return toast('浏览器不支持定位');
  toast('正在获取物理 GPS...');
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude, lon = pos.coords.longitude;
      if (!realLocMarker) {
        realLocMarker = L.circleMarker([lat, lon], {
          radius: 7,
          color: '#ffffff',
          weight: 2,
          fillColor: '#34C759',
          fillOpacity: 1
        }).addTo(map);
      } else {
        realLocMarker.setLatLng([lat, lon]);
      }
      moveTo(lat, lon, 16);
      toast('已定位到物理 GPS 位置');
    },
    err => toast('定位获取失败: ' + err.message)
  );
}

// 搜索解析
function handleSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return toast('请输入查询内容');

  let match = query.match(/(-?\d{1,3}\.\d+)[,\s]+(-?\d{1,3}\.\d+)/);
  if (match) {
    return moveTo(parseFloat(match[1]), parseFloat(match[2]), 16);
  }

  toast('搜索中...');
  fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`)
    .then(r => r.json())
    .then(data => {
      if (data && data.length > 0) {
        moveTo(parseFloat(data[0].lat), parseFloat(data[0].lon), 16);
        toast(`已找到: ${data[0].display_name.slice(0, 16)}`);
      } else {
        toast('未找到对应位置');
      }
    })
    .catch(() => toast('搜索解析连接失败'));
}

function copyCoord(type) {
  const val = type === 'lon' ? currentLon.toFixed(6) : currentLat.toFixed(6);
  copyText(val);
}

function getFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch(e) { return []; }
}

function renderFavs() {
  const favs = getFavs();
  const container = document.getElementById('favContainer');
  if (!favs.length) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = favs.map((f, i) => `
    <div class="fav-chip" onclick="moveTo(${f.lat}, ${f.lon}, 16)">
      📍 ${escapeHtml(f.name)}
      <span class="fav-del" onclick="event.stopPropagation(); delFav(${i})">×</span>
    </div>
  `).join('');
}

function confirmAddFav() {
  const name = document.getElementById('favNameInput').value.trim();
  if (!name) return toast('请输入名称');
  const favs = getFavs();
  favs.push({ name, lat: currentLat, lon: currentLon });
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  closeModal('favModal');
  renderFavs();
  toast(`✓ 已收藏: ${name}`);
}

function delFav(i) {
  const favs = getFavs();
  favs.splice(i, 1);
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  renderFavs();
}

function togglePopover(id) {
  const el = document.getElementById(id);
  el.classList.toggle('active');
}
function closePopover(id) { document.getElementById(id).classList.remove('active'); }

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function copyText(text) { navigator.clipboard.writeText(text).then(() => toast('✓ 已复制到剪贴板')); }
function escapeHtml(str) { return str.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });
document.addEventListener('click', e => {
  if (!e.target.closest('.top-icon-btn') && !e.target.closest('.menu-popover')) {
    closePopover('layerMenu');
  }
});

window.onload = initMap;
</script>
</body>
</html>
