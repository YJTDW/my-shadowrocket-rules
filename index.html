<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Apple WLOC 虚拟定位</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --accent: #0A67D8;
  --accent-hover: #095FC7;
  --accent-tint: rgba(10, 103, 216, 0.1);
  --danger: #FF3B30;
  --success: #34C759;
  --bg-panel: rgba(248, 250, 252, 0.94);
  --bg-input: rgba(238, 240, 243, 0.7);
  --text-main: #1F2937;
  --text-sub: #8E8E93;
  --border-light: rgba(226, 232, 240, 0.8);
  --shadow-panel: 0 -8px 32px rgba(15, 23, 42, 0.08);
  --shadow-btn: 0 6px 18px rgba(10, 103, 216, 0.22);
  --shadow-card: 0 4px 16px rgba(15, 23, 42, 0.04);

  /* 三档统一圆角 */
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 28px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; background: #e2e8f0; color: var(--text-main); }

/* 全屏地图画布 */
#map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; background: #f1f5f9; }

/* 顶部搜索与样式选项 */
.top-bar {
  position: absolute;
  top: max(12px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%);
  width: min(calc(100% - 24px), 480px);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.search-box {
  display: flex;
  align-items: center;
  background: var(--bg-panel);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: var(--radius-md);
  padding: 4px 6px 4px 14px;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-light);
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 14px;
  color: var(--text-main);
  outline: none;
  font-weight: 400;
}
.search-input::placeholder { color: var(--text-sub); }

.search-btn-icon {
  border: none;
  background: transparent;
  padding: 8px;
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
}

/* 顶部模式切换 Pills */
.layer-pills {
  display: flex;
  gap: 4px;
  background: var(--bg-panel);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: var(--radius-sm);
  padding: 3px;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow-card);
}

.pill-btn {
  flex: 1;
  border: none;
  background: transparent;
  padding: 6px 0;
  border-radius: 9px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: center;
}

.pill-btn.active {
  background: var(--accent-tint);
  color: var(--accent);
  font-weight: 600;
}

/* 底部面板 (克制的苹果系统工具风) */
.bottom-sheet {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(100%, 500px);
  z-index: 1000;
  background: var(--bg-panel);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  box-shadow: var(--shadow-panel);
  padding: 10px 20px max(18px, env(safe-area-inset-bottom)) 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.drag-handle {
  width: 32px;
  height: 4px;
  background: rgba(142, 142, 147, 0.3);
  border-radius: 2px;
  margin: 0 auto 2px auto;
}

/* 坐标显示（两列精简设计） */
.coord-card {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  background: var(--bg-input);
  padding: 10px 14px;
  border-radius: var(--radius-md);
}

.coord-item {
  display: flex;
  flex-direction: column;
}

.label {
  font-size: 11px;
  color: var(--text-sub);
  font-weight: 400;
  margin-bottom: 2px;
}

.coordinate {
  font-family: "SF Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.4px;
  color: var(--text-main);
}

/* 系统级提示风格的状态栏 */
.system-status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 2px 2px;
}

.status-info {
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
}
.status-dot.off { background: var(--text-sub); }

.status-text-group {
  display: flex;
  flex-direction: column;
}

.status-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-main);
}

.status-sub {
  font-size: 11px;
  color: var(--text-sub);
  font-weight: 400;
}

.icon-btn {
  border: none;
  background: transparent;
  padding: 6px;
  color: var(--text-sub);
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-btn:active { background: rgba(0,0,0,0.05); }

/* 操作按钮层级优化 */
.action-area {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #ffffff;
  border: none;
  border-radius: var(--radius-md);
  padding: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: var(--shadow-btn);
  transition: background 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-primary:active { background: var(--accent-hover); }

.btn-secondary-row {
  display: flex;
  gap: 8px;
}

.btn-secondary {
  flex: 1;
  background: var(--bg-input);
  color: var(--text-main);
  border: none;
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  font-size: 12px;
  font-weight: 550;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.btn-secondary:active { background: rgba(220, 224, 230, 0.8); }

/* 收藏卡片横向滑块 */
.fav-bar {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
}
.fav-bar::-webkit-scrollbar { display: none; }

.fav-chip {
  background: #fff;
  border: 1px solid var(--border-light);
  padding: 4px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}
.fav-del { color: var(--text-sub); margin-left: 2px; font-size: 12px; }

/* 底部辅助链接 */
.footer-links {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 2px;
}

.link-btn {
  border: none;
  background: transparent;
  font-size: 11px;
  color: var(--text-sub);
  cursor: pointer;
  font-weight: 400;
}
.link-btn.danger { color: var(--danger); }

/* 模态弹窗 */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background: rgba(15, 23, 42, 0.3);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }

.modal-box {
  background: #ffffff;
  width: min(100%, 340px);
  border-radius: var(--radius-md);
  padding: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.12);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.modal-title { font-size: 16px; font-weight: 600; text-align: center; color: var(--text-main); }
.modal-input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border-light);
  background: var(--bg-input);
  border-radius: var(--radius-sm);
  font-size: 14px;
  outline: none;
}
.modal-btns { display: flex; gap: 8px; }

.toast {
  position: fixed;
  top: max(16px, env(safe-area-inset-top));
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: rgba(30, 41, 59, 0.9);
  color: #fff;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  z-index: 10000;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 高效地图画布 -->
<div id="map"></div>

<!-- 顶部搜索与切图 Pills -->
<div class="top-bar">
  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="搜索地名、地址或粘贴坐标..." />
    <button class="search-btn-icon" onclick="handleSearch()" title="搜索">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </button>
  </div>

  <div class="layer-pills">
    <button class="pill-btn active" data-layer="amap" onclick="switchLayer('amap')">高德矢量</button>
    <button class="pill-btn" data-layer="satellite" onclick="switchLayer('satellite')">高德卫星</button>
    <button class="pill-btn" data-layer="light" onclick="switchLayer('light')">浅色极简</button>
    <button class="pill-btn" data-layer="dark" onclick="switchLayer('dark')">深色暗夜</button>
  </div>
</div>

<!-- 底部控制面板 (克制精致系统风) -->
<div class="bottom-sheet">
  <div class="drag-handle"></div>

  <!-- 两列式坐标卡片 -->
  <div class="coord-card">
    <div class="coord-item">
      <span class="label">经度</span>
      <span class="coordinate" id="lonDisplay">113.941140</span>
    </div>
    <div class="coord-item">
      <span class="label">纬度</span>
      <span class="coordinate" id="latDisplay">22.544577</span>
    </div>
  </div>

  <!-- 系统规范状态提醒 -->
  <div class="system-status-bar">
    <div class="status-info">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text-group">
        <span class="status-title" id="statusTitle">系统数据检查中...</span>
        <span class="status-sub" id="statusSub">请确保代理工具处于开启状态</span>
      </div>
    </div>
    <button class="icon-btn" onclick="queryActive()" title="刷新状态">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
      </svg>
    </button>
  </div>

  <!-- 收藏夹 Pills -->
  <div id="favContainer" class="fav-bar"></div>

  <!-- 层次分明动作按钮组 -->
  <div class="action-area">
    <button class="btn-primary" id="saveBtn" onclick="saveLocation()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
        <polyline points="17 21 17 13 7 13 7 21"></polyline>
        <polyline points="7 3 7 8 15 8"></polyline>
      </svg>
      写入设备定位
    </button>

    <div class="btn-secondary-row">
      <button class="btn-secondary" onclick="locateMe()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
        </svg>
        定位当前
      </button>

      <button class="btn-secondary" onclick="openModal('favModal')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
        收藏点位
      </button>
    </div>
  </div>

  <!-- 底部离散辅助链接 -->
  <div class="footer-links">
    <button class="link-btn danger" onclick="clearActiveLocation()">还原真实定位</button>
    <button class="link-btn" onclick="openModal('helpModal')">模块安装说明</button>
  </div>
</div>

<!-- Toast 消息 -->
<div class="toast" id="toast"></div>

<!-- 收藏弹窗 -->
<div class="modal-overlay" id="favModal">
  <div class="modal-box">
    <div class="modal-title">收藏当前点位</div>
    <input type="text" id="favNameInput" class="modal-input" placeholder="备注名称（如：家、公司）" maxlength="15" />
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeModal('favModal')">取消</button>
      <button class="btn-primary" style="flex:1" onclick="confirmAddFav()">保存</button>
    </div>
  </div>
</div>

<!-- 模块说明弹窗 -->
<div class="modal-overlay" id="helpModal">
  <div class="modal-box">
    <div class="modal-title">模块与快捷指令</div>
    <div style="font-size:12px; color:var(--text-sub); line-height:1.6; display:flex; flex-direction:column; gap:8px;">
      <button class="btn-secondary" onclick="copyText('https://raw.githubusercontent.com/YJTDW/my-shadowrocket-rules/main/apple-wloc.module')">复制专属云端模块 URL</button>
      <a class="btn-secondary" style="text-decoration:none;" href="https://www.icloud.com/shortcuts/2a811c3bac0e4694b1875ae45b26ab0d" target="_blank">📥 添加 iOS 定位键快捷指令</a>
      <a class="btn-secondary" style="text-decoration:none;" href="https://www.icloud.com/shortcuts/9092b1a576cf4b7c8bc0dd931ba512a6" target="_blank">🔄 添加 iOS 恢复键快捷指令</a>
    </div>
    <button class="btn-secondary" onclick="closeModal('helpModal')">关闭</button>
  </div>
</div>

<script>
const SAVE_API = 'https://gs-loc.apple.com/wloc-settings/save';
const FAV_KEY = 'apple_wloc_favs_v2';

let currentLat = 22.544577, currentLon = 113.941140;
let map, marker, currentLayer;

// 高效地图图层源 (国内高德镜像与快速 CDN 预加载)
const tileLayers = {
  amap: L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
    subdomains: ['1', '2', '3', '4'],
    maxZoom: 18,
    maxNativeZoom: 18,
    updateWhenIdle: false,
    updateWhenZooming: false,
    keepBuffer: 4
  }),
  satellite: L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', {
    subdomains: ['1', '2', '3', '4'],
    maxZoom: 18,
    maxNativeZoom: 18,
    updateWhenIdle: false,
    updateWhenZooming: false,
    keepBuffer: 4
  }),
  light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    updateWhenIdle: false
  }),
  dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    updateWhenIdle: false
  })
};

function initMap() {
  map = L.map('map', {
    zoomControl: false,
    attributionControl: false,
    fadeAnimation: true,
    zoomAnimation: true
  }).setView([currentLat, currentLon], 15);

  currentLayer = tileLayers.amap;
  currentLayer.addTo(map);

  // 精致软核 Marker 标记
  const customIcon = L.divIcon({
    className: 'custom-pin',
    html: `<div style="width:20px;height:20px;background:#0A67D8;border:2.5px solid #ffffff;border-radius:50%;box-shadow:0 3px 10px rgba(10,103,216,0.35);"></div>`,
    iconSize: [20, 20],
    iconAnchor: [10, 10]
  });

  marker = L.marker([currentLat, currentLon], { draggable: true, icon: customIcon }).addTo(map);

  marker.on('dragend', e => {
    const pos = e.target.getLatLng();
    updateCoords(pos.lat, pos.lng);
  });

  map.on('click', e => {
    updateCoords(e.latlng.lat, e.latlng.lng);
  });

  renderFavs();
  queryActive();
}

function switchLayer(name) {
  if (currentLayer) map.removeLayer(currentLayer);
  currentLayer = tileLayers[name];
  currentLayer.addTo(map);

  document.querySelectorAll('.pill-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.layer === name);
  });
}

function updateCoords(lat, lon) {
  currentLat = lat;
  currentLon = lon;
  marker.setLatLng([lat, lon]);
  document.getElementById('lonDisplay').textContent = lon.toFixed(6);
  document.getElementById('latDisplay').textContent = lat.toFixed(6);
}

function moveTo(lat, lon, zoom = 15) {
  updateCoords(lat, lon);
  map.setView([lat, lon], zoom);
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// 写入数据
async function saveLocation() {
  const btn = document.getElementById('saveBtn');
  btn.style.opacity = '0.75';
  btn.textContent = '写入设备中...';

  try {
    const res = await fetch(`${SAVE_API}?lon=${currentLon}&lat=${currentLat}&acc=25`, { method: 'GET', mode: 'cors', cache: 'no-store' });
    const data = await res.json();
    if (data.success) {
      toast('✓ 定位已被写入系统存储');
      queryActive();
    } else {
      throw new Error(data.error || '失败');
    }
  } catch (e) {
    toast('✓ 坐标更新请求已发出');
  } finally {
    btn.style.opacity = '1';
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>写入设备定位`;
  }
}

// 查询系统激活状态
function queryActive() {
  const title = document.getElementById('statusTitle');
  const sub = document.getElementById('statusSub');
  const dot = document.getElementById('statusDot');

  title.textContent = '设备持久化数据检查中...';

  fetch(`${SAVE_API}?action=query`, { method: 'GET', mode: 'cors', cache: 'no-store' })
    .then(r => r.json())
    .then(d => {
      if (d.success && d.longitude && d.latitude) {
        title.textContent = `已生效: ${parseFloat(d.longitude).toFixed(4)}, ${parseFloat(d.latitude).toFixed(4)}`;
        sub.textContent = '虚拟定位修改生效中';
        dot.className = 'status-dot';
      } else {
        title.textContent = '无已保存坐标数据';
        sub.textContent = '设备处于真实 GPS 定位模式';
        dot.className = 'status-dot off';
      }
    })
    .catch(() => {
      title.textContent = '未连接配置节点';
      sub.textContent = '请检查小火箭代理或模块是否开启';
      dot.className = 'status-dot off';
    });
}

function clearActiveLocation() {
  if (!confirm('确定清除设备持久化数据？将自动恢复真实 GPS。')) return;
  fetch(`${SAVE_API}?action=clear`, { method: 'GET', mode: 'cors', cache: 'no-store' })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        toast('✓ 已清除，恢复真实定位');
        queryActive();
      }
    })
    .catch(() => toast('清除请求已发出'));
}

function locateMe() {
  if (!navigator.geolocation) return toast('无法获取浏览器定位');
  toast('获取当前位置中...');
  navigator.geolocation.getCurrentPosition(
    pos => moveTo(pos.coords.latitude, pos.coords.longitude, 16),
    err => toast('定位获取失败: ' + err.message)
  );
}

function handleSearch() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return toast('请输入查询内容');

  let match = query.match(/(-?\d{1,3}\.\d+)[,\s]+(-?\d{1,3}\.\d+)/);
  if (match) {
    return moveTo(parseFloat(match[1]), parseFloat(match[2]), 16);
  }

  toast('搜索地名中...');
  fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`)
    .then(r => r.json())
    .then(data => {
      if (data && data.length > 0) {
        moveTo(parseFloat(data[0].lat), parseFloat(data[0].lon), 16);
        toast(`已找到: ${data[0].display_name.slice(0, 18)}`);
      } else {
        toast('未搜索到对应位置');
      }
    })
    .catch(() => toast('搜索连接异常'));
}

function getFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)) || []; } catch(e) { return []; }
}

function renderFavs() {
  const favs = getFavs();
  const container = document.getElementById('favContainer');
  if (!favs.length) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = favs.map((f, i) => `
    <div class="fav-chip" onclick="moveTo(${f.lat}, ${f.lon}, 16)">
      📍 ${escapeHtml(f.name)}
      <span class="fav-del" onclick="event.stopPropagation(); delFav(${i})">×</span>
    </div>
  `).join('');
}

function confirmAddFav() {
  const name = document.getElementById('favNameInput').value.trim();
  if (!name) return toast('请输入点位名称');
  const favs = getFavs();
  favs.push({ name, lat: currentLat, lon: currentLon });
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  closeModal('favModal');
  renderFavs();
  toast(`✓ 已保存: ${name}`);
}

function delFav(i) {
  const favs = getFavs();
  favs.splice(i, 1);
  localStorage.setItem(FAV_KEY, JSON.stringify(favs));
  renderFavs();
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function copyText(text) { navigator.clipboard.writeText(text).then(() => toast('✓ 已复制链接')); }
function escapeHtml(str) { return str.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });

window.onload = initMap;
</script>
</body>
</html>
